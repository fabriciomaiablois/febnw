<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

<head>
    <meta charset="UTF-8">
    <title>
        Flavia e Bruno no Wacken!
    </title>
    {{ partial "head.html" . }}

    <style>
        .hero {
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-image: url("landscape-shine.png");
        }

        .hero.rain {
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-image: url("landscape-rain.png");
        }

        @media (orientation: portrait) {
            .hero {
                background-image: url("portrait-shine.png");
            }

            .hero.rain {
                background-image: url("portrait-rain.png");
            }
        }
    </style>

</head>
<body>

<div id="themeToggle" class="hero"></div>

<script>
    const hero = document.querySelector(".hero");

    document.getElementById("themeToggle").addEventListener("click", function () {
        if (hero.classList.contains("rain")) {
            hero.classList.remove("rain");
        } else {
            hero.classList.add("rain");
        }
    });
</script>

</body>
</html>
