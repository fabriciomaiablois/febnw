<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

<head>
    <meta charset="UTF-8">
    <title>
        Flavia e Bruno no Wacken!
    </title>
    {{ partial "head.html" . }}
</head>
<body>

<div id="themeToggle" class="hero"></div>

<script>
    const hero = document.querySelector(".hero");

    document.getElementById("themeToggle").addEventListener("click", function () {
        if (hero.classList.contains("rain")) {
            hero.classList.remove("rain");
        } else {
            hero.classList.add("rain");
        }
    });
</script>

</body>
</html>
