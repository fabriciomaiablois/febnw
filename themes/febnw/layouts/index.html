<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

<head>
    <meta charset="UTF-8">
    <title>
        Flavia e Bruno no Wacken!
    </title>
    {{ partial "head.html" . }}

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: white;
            transition: background 0.3s ease;
        }

        body.dark {
            background: #121212;
        }

        #themeToggle {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* fills entire screen */
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <img id="themeToggle" src="/shine.png" alt="Rain or Shine">
</div>

<script>
    const img = document.getElementById("themeToggle");

    const shine = "shine.png";
    const rain = "rain.png";

    img.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
            img.src = rain;
        } else {
            img.src = shine;
        }
    });
</script>

</body>
</html>
